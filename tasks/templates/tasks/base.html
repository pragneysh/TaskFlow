<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow - Task Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm border-bottom py-3">
      <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold fs-3 text-primary" href="/">
          TaskFlow
        </a>

        <!-- Mobile Toggle -->
        <button
          class="navbar-toggler border-0 shadow-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Items -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center gap-3">
            <li class="nav-item">
              <a class="nav-link fw-semibold text-dark" href="/"> Dashboard </a>
            </li>

            <li class="nav-item">
              <a class="nav-link fw-semibold text-dark" href="/tasks/">
                Tasks
              </a>
            </li>

            <!-- Premium Create Button -->
            <li class="nav-item">
              <a
                href="/create/"
                class="btn btn-primary px-4 py-2 rounded-pill fw-semibold shadow"
              >
                + New Task
              </a>
            </li>

            <!-- Logout -->
            <li class="nav-item">
              <a
                class="btn btn-outline-danger rounded-pill px-4 fw-semibold"
                href="/logout/"
              >
                Logout
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">{% block content %} {% endblock %}</div>

    <!-- Footer -->
    <footer class="text-center py-4 text-muted small">
      Built with Django 4.2 + Bootstrap 5
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
